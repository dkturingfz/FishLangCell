model_name: fish-langcell-base
version: 0.1
cell_encoder_init: configs/model/fish_geneformer_base.yaml
text_encoder_backbone: microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext
projection_dim: 256
alignment_objectives:
  - contrastive
  - matching
text_prompt_types:
  - short_label
  - definition_sentence
  - marker_sentence
  - hierarchical_sentence
notes: "Broad fish multimodal model before testis specialization."
