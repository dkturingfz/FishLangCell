version: 0.1
policy_name: fish_langcell_gene_id_policy_frozen_v0_1
canonical_id_type: ensembl_gene_id
accepted_id_types:
  - ensembl_gene_id
  - gene_symbol
  - ensembl_or_symbol_mixed
species_priority:
  - Danio rerio
  - teleost_mixed
paralog_policy:
  keep_paralogs_separate: true
  collapse_paralogs: false
  notes: teleost paralogs remain separate by default
orthogroup_policy:
  role: auxiliary_metadata_only
  may_merge_primary_tokens: false
  required_reference_file: data/vocab/orthogroup_reference.tsv
unresolved_id_policy:
  allow_unresolved: true
  unresolved_markers:
    - TBD
    - unknown
    - pending_curation
  require_explicit_record: true
required_fields:
  - token_id
  - species
  - gene_id
  - gene_symbol
  - gene_biotype
  - status
audit_fields:
  - source
  - notes
  - mapping_status
  - ambiguity_flag
